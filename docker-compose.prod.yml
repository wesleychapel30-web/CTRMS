services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ctrms}
      POSTGRES_USER: ${POSTGRES_USER:-ctrms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctrms} -d ${POSTGRES_DB:-ctrms}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  web:
    image: ${CTRMS_IMAGE:-ghcr.io/wesleychapel30-web/ctrms:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-ctrms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ctrms}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  celery_worker:
    image: ${CTRMS_IMAGE:-ghcr.io/wesleychapel30-web/ctrms:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-ctrms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ctrms}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["celery", "-A", "ctrms_config", "worker", "-l", "INFO"]
    volumes:
      - media_data:/app/media

  celery_beat:
    image: ${CTRMS_IMAGE:-ghcr.io/wesleychapel30-web/ctrms:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-ctrms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ctrms}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["celery", "-A", "ctrms_config", "beat", "-l", "INFO"]
    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
